name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt into Node.js 24 for all actions now, before the June 2 2026 forced cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --coverage

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check edge functions
        run: |
          deno check supabase/functions/maps-routes/index.ts
          deno check supabase/functions/maps-places/index.ts
          deno check supabase/functions/tfnsw-proxy/index.ts
          deno check supabase/functions/notify/index.ts
          deno check supabase/functions/cleanup-cron/index.ts

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: analyze-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }} \
            --dart-define=APP_ENV=production

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk


  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: analyze-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Update CocoaPods repo
        run: pod repo update

      - name: Build iOS (no code sign)
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }} \
            --dart-define=APP_ENV=production

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: analyze-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web (release)
        run: |
          flutter build web --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }} \
            --dart-define=APP_ENV=production

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: build/web/


  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: analyze-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS (release)
        run: |
          flutter build macos --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }} \
            --dart-define=APP_ENV=production

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: build/macos/Build/Products/Release/

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: analyze-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      # The runner double-nests the long repo name giving a 104-char prefix.
      # Deep plugin-include and MSBuild tlog paths exceed MAX_PATH even with
      # LongPathsEnabled because several tools (FileTracker.exe, cl.exe 32-bit)
      # have no longPathAware manifest.
      #
      # Solution: robocopy the source to C:\b (3-char prefix) so every
      # generated path is well under 260 chars with no junction/subst
      # complications.  flutter assemble also works cleanly because it finds
      # pubspec.yaml immediately in C:\b without resolving virtual drives.
      - name: Configure git long paths
        shell: powershell
        run: git config --system core.longpaths true

      - uses: actions/checkout@v4

      - name: Copy source to short path C:\b
        shell: powershell
        run: |
          robocopy "$env:GITHUB_WORKSPACE" C:\b /E /NFL /NDL /NJH /NJS /NP
          # robocopy uses bit-masked exit codes; 0-7 all mean success.
          if ($LASTEXITCODE -gt 7) { throw "robocopy failed ($LASTEXITCODE)" }
          # GitHub Actions PowerShell shell appends `exit $LASTEXITCODE` after
          # the script, so we must reset it to 0 or the step fails even on
          # robocopy success (exit 1 = "files copied", which is normal).
          $global:LASTEXITCODE = 0
          # Disable MSBuild FileTracker (FTK1011 fix): FileTracker.exe has no
          # longPathAware manifest and ignores LongPathsEnabled.  Setting
          # TrackFileAccess=false prevents tlog creation entirely (safe in CI).
          Set-Content -Path C:\b\Directory.Build.props `
            -Value '<Project><PropertyGroup><TrackFileAccess>false</TrackFileAccess></PropertyGroup></Project>'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: 'C:\b'
        shell: powershell
        run: flutter pub get

      - name: Build Windows (release)
        working-directory: 'C:\b'
        shell: powershell
        run: |
          flutter build windows --release `
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} `
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} `
            --dart-define=GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }} `
            --dart-define=APP_ENV=production

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: 'C:\b\build\windows\x64\runner\Release\'
