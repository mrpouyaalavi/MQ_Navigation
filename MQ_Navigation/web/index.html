<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="mq_navigation">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>mq_navigation</title>
  <link rel="manifest" href="manifest.json">

  <!--
    `google_maps_config.js` is generated locally / in CI and is intentionally
    gitignored. It can set `window.GOOGLE_MAPS_API_KEY` for web builds without
    committing the key into source control.

    Loaded via synchronous XHR so the value is available before
    flutter_bootstrap.js runs, and a missing file (404) is handled silently
    without Chrome MIME-type errors.
  -->
  <script>
    window.GOOGLE_MAPS_API_KEY = window.GOOGLE_MAPS_API_KEY || "";
    try {
      var xhr = new XMLHttpRequest();
      xhr.open("GET", "google_maps_config.js", false);
      xhr.send();
      if (xhr.status === 200) { new Function(xhr.responseText)(); }
    } catch (_) { /* file not present or blocked – continue without */ }
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
