name: mq_navigation
description: MQ Navigation — Macquarie University Open Day campus navigation app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core
  supabase_flutter: ^2.12.0
  flutter_riverpod: ^3.2.1
  go_router: ^17.1.0
  intl: ^0.20.2

  # Maps & Location
  google_maps_flutter: ^2.14.2
  geolocator: ^13.0.0
  permission_handler: ^12.0.1

  # Security
  local_auth: ^3.0.0
  flutter_secure_storage: ^10.0.0

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.3.0

  # Utilities
  connectivity_plus: ^6.1.4
  logger: ^2.5.0
  url_launcher: ^6.2.2
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
