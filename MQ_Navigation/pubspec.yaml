name: mq_navigation
description: MQ Navigation — Macquarie University campus navigation mobile app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core
  supabase_flutter: ^2.12.0
  firebase_core: ^4.2.0
  flutter_riverpod: ^3.2.1
  go_router: ^17.1.0
  intl: ^0.20.2
  timezone: ^0.11.0

  # Maps & Location
  google_maps_flutter: ^2.15.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  permission_handler: ^12.0.1

  # Security
  flutter_secure_storage: ^10.0.0

  # Notifications
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^21.0.0

  # UI
  cupertino_icons: ^1.0.8

  # Utilities
  connectivity_plus: ^7.0.0
  http: ^1.4.0
  logger: ^2.5.0
  shared_preferences: ^2.5.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/data/
    - assets/maps/
