# Supabase Edge Functions configuration
# https://supabase.com/docs/guides/functions

[project]
id = "mq-navigation"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[auth]
enabled = true
site_url = "io.mqnavigation://callback"
additional_redirect_urls = [
  "io.mqnavigation://callback",
  "https://mqnavigation.io/auth/callback",
]

[auth.email]
enable_confirmations = true

[auth.external.google]
enabled = true

[functions.maps-routes]
verify_jwt = true

[functions.notify]
verify_jwt = true

[functions.cleanup-cron]
verify_jwt = true
